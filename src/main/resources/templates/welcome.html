<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantalla de Bienvenida al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212; /* Fondo oscuro */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .logo {
            max-width: 200px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00ffcc); /* efecto glow */
        }

        .current-user {
            margin-bottom: 40px;
            font-size: 1.2rem;
            color: #00ffc2;
        }

        .menu-button {
            width: 280px;
            height: 80px;
            margin: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 25px;
            gap: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .menu-button i {
            font-size: 2rem;
        }

        /* Colores dark para cada botón */
        .btn-plantillas { background-color: #1f2937; color: #00ffc2; }
        .btn-usuarios { background-color: #1f2937; color: #ffbf00; }
        .btn-config { background-color: #1f2937; color: #ff4d6d; }

        /* Hover efecto glow */
        .menu-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,255,200,0.7);
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <img src="img/easyemailtemplate.png" style="width: 150px; height: 150px;" alt="EasyEmailMailTemplate" class="logo">

    <!-- Usuario actual -->
    <div class="current-user" id="currentUserDisplay">
        Bienvenido {{USUARIO}}
    </div>

    <!-- Botones de menú -->
    <div class="d-flex flex-column align-items-center">
        <button class="menu-button btn-plantillas" onclick="goTo('TEMPLATE_LIST')">
            <i class="bi bi-file-text"></i>
            Administraci&oacute;n de Plantillas
        </button>
        <button class="menu-button btn-usuarios" onclick="goTo('USER_ADMIN')">
            <i class="bi bi-people"></i>
            Administración de Usuarios
        </button>
        <button class="menu-button btn-config" onclick="goTo('SYS_CONFIG')">
            <i class="bi bi-gear"></i>
            Configuración del Sistema
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Si quieres actualizar dinámicamente desde JS:
        const currentUser = "Federico Martinez Escamilla"; // <-- Aquí tu variable real
        document.getElementById("currentUserDisplay").textContent = "Bienvenido al sistema " + currentUser + "!";
        
        
        function goTo(opt){
        	switch(opt){
	        	case 'TEMPLATE_LIST': window.location.href = "/templates-list"; break;
	        	case 'USER_ADMIN': window.location.href = "/user-admin"; break;
	        	case 'SYS_CONFIG': window.location.href = "/sys-config"; break;
        	}
        }
    </script>
</body>
</html>
