<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido - EasyEmailMailTemplate</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

	<link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card text-center">

            <h1 class="welcome-title">Bienvenido</h1>
            
            <div class="logo-container">
                <img src="img/easyemailtemplate.png" alt="Logo EasyEmailMailTemplate">
            </div>

            <form action="welcome">
                <div class="mb-3 text-start">
                    <label for="username" class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control" id="username" placeholder="Ingresa tu usuario">
                    </div>
                </div>

                <div class="mb-3 text-start">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" class="form-control" id="password" placeholder="Ingresa tu password">
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-4">
                    <a href="#" class="forgot-password">
                        ¿Olvidaste tu password?
                    </a>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Iniciar Sesión
                    </button>
                </div>

            </form>

            <div class="footer-text">
                EasyEmailMailTemplate © 2026
            </div>

        </div>
    </div>

</body>
</html>
