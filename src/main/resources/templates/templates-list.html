<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Plantillas</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Tabulator -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.5/dist/css/tabulator_midnight.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/css/template-administration.css">
</head>
<body>

    <div class="container-fluid page-container">

        <!-- Header -->
        <div class="header-section text-center">

            <img 
                src="/img/easyemailtemplate.png" 
                alt="EasyEmailTemplate" 
                style="width: 50px; height: 50px"
                class="logo"
            >

            <h1 class="page-title">
                <i class="bi bi-file-earmark-text-fill"></i>
                Administración de Plantillas
            </h1>

            <p class="page-subtitle">
                Consulta y administración de plantillas configuradas en el sistema
            </p>

        </div>

        <!-- Card principal -->
        <div class="table-card">

            <div class="table-header d-flex justify-content-between align-items-center flex-wrap gap-3">

                <div>
                    <h4 class="table-title mb-1">
                        <i class="bi bi-table"></i>
                        Plantillas Registradas
                    </h4>

                    <small class="table-description">
                        Listado paginado de plantillas configuradas
                    </small>
                </div>

                <button type="button" class="btn btn-success new-template-button">
                    <i class="bi bi-plus-circle"></i>
                    Nueva Plantilla
                </button>

            </div>

            <hr class="table-divider">

            <!-- Tabla -->
            <div id="templateTable"></div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tabulator JS -->
    <script src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
    

    <!-- JS personalizado -->
    <script src="/js/template-administration.js"></script>

</body>
</html>
