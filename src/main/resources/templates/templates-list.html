<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración de Plantillas</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Tabulator -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.5/dist/css/tabulator_midnight.min.css">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="/css/template-administration.css">
</head>
<body>

    <div class="container-fluid page-container">

        <!-- Header -->
        <div class="header-section text-center">

            <img 
                src="/img/easyemailtemplate.png" 
                alt="EasyEmailTemplate"
                class="logo"
                style="width: 50px; width: 50px"
            >

            <h3 class="page-title">
                <i class="bi bi-file-earmark-text-fill"></i>
                Administración de Plantillas
            </h3>

            <p class="page-subtitle">
                Consulta y administración de plantillas
            </p>

        </div>

        <!-- Card principal -->
        <div class="table-card">

            <div class="table-header d-flex justify-content-between align-items-center gap-3 flex-wrap">

                <div class="search-container flex-grow-1">
                    <div class="input-group custom-search-group">
                        <span class="input-group-text custom-search-icon">
                            <i class="bi bi-search"></i>
                        </span>

                        <input 
                            type="text"
                            id="templateSearch"
                            class="form-control custom-search-input"
                            placeholder="Buscar plantilla por nombre..."
                        >
                    </div>
                </div>

                <button 
                    type="button"
                    class="btn btn-success new-template-button"
                    onclick="addNew()"
                >
                    <i class="bi bi-plus-circle"></i>
                    Nueva Plantilla
                </button>

            </div>

            <hr class="table-divider">

            <!-- Tabla -->
            <div id="templateTable"></div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Tabulator JS -->
    <script
        src="https://cdn.jsdelivr.net/npm/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>

    <!-- JS personalizado -->
    <script src="/js/template-administration.js"></script>

    <script type="text/javascript">
        function addNew() {
            window.location.href = "/wysiwyg";
        }
    </script>

</body>
</html>
