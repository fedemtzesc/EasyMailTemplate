spring.application.name=EasyMailTemplate
server.port=8080


# Configuración de la Base de Datos en ambienteDEV
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.url=${EASYEMAILTEMPLATE_DB_URL_MYSQL_DEV}
spring.datasource.username=${EASYEMAILTEMPLATE_DB_USR_MYSQL_DEV}
spring.datasource.password=${EASYEMAILTEMPLATE_DB_PWD_MYSQL_DEV}
